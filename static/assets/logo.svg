<svg viewBox="0 0 270 52" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="gc">
      <circle cx="74" cy="18" r="15.5"/>
    </clipPath>
  </defs>

  <!-- small world: empty -->
  <circle cx="11" cy="40" r="8" fill="none" stroke="white" stroke-width="1.4" opacity="0.45"/>

  <!-- connecting curve -->
  <path d="M19,40 C32,52 46,4 58,20" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3 3" opacity="0.55"/>

  <!-- large world: outer circle -->
  <circle cx="74" cy="18" r="16" fill="none" stroke="white" stroke-width="1.8"/>

  <!-- globe grid -->
  <g clip-path="url(#gc)" opacity="0.5">
    <line x1="58" y1="18" x2="90" y2="18" stroke="white" stroke-width="0.9"/>
    <path d="M59,11 Q74,8 89,11" fill="none" stroke="white" stroke-width="0.8"/>
    <path d="M59,25 Q74,28 89,25" fill="none" stroke="white" stroke-width="0.8"/>
    <ellipse cx="74" cy="18" rx="6" ry="15.5" fill="none" stroke="white" stroke-width="0.9"/>
    <ellipse cx="74" cy="18" rx="12" ry="15.5" fill="none" stroke="white" stroke-width="0.7"/>
  </g>

  <!-- text -->
  <text x="104" y="30" font-family="Georgia, serif" font-size="20" font-weight="normal" fill="white" letter-spacing="0.5">remote worlds</text>
</svg>
