{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ if eq (.Get "vertical" | default "false") "true" }}
<div class="article-img-v" style="width:calc(100% + 194px);margin-left:-97px;margin-top:36px;"><img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" style="width:100%;height:550px;object-fit:cover;display:block;border-radius:4px;"></div>
{{ else }}
<div class="article-img" style="width:calc(100% + 194px);margin-left:-97px;margin-top:36px;"><img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" style="width:100%;height:550px;object-fit:cover;display:block;border-radius:4px;"></div>
{{ end }}
